# Standalone topology: single-broker Apache Kafka cluster (KRaft mode).
# No ZooKeeper required — KRaft handles metadata natively.
# Suitable for development, local testing, and non-HA workloads.
# NOT recommended for production.

config:
  components:
    engine: {}

ui:
  sections:
    kafkaVersion:
      label: "Kafka Version"
      description: "Select the Apache Kafka version to deploy."
      components:
        version:
          uiType: select
          path: spec.version
          fieldParams:
            label: "Kafka Version"
            optionsPath: spec.versions
            optionsPathConfig:
              labelPath: "name"
              valuePath: "name"
            modes:
              edit:
                disabled: true
          validation:
            required: true

    resources:
      label: "Resources"
      description: "Configure compute resources and storage for the Kafka broker."
      components:
        compute:
          uiType: group
          groupType: line
          components:
            cpu:
              uiType: number
              path: spec.components.engine.resources.limits.cpu
              fieldParams:
                label: "CPU"
                defaultValue: 1
                step: 1
              validation:
                required: true
                min: 1
            memory:
              uiType: number
              path: spec.components.engine.resources.limits.memory
              fieldParams:
                label: "Memory"
                defaultValue: 2
                step: 1
                badge: "Gi"
                badgeToApi: true
              validation:
                required: true
                min: 1
            disk:
              uiType: number
              path: spec.components.engine.storage.size
              fieldParams:
                label: "Disk"
                defaultValue: 10
                badge: "Gi"
                badgeToApi: true
              validation:
                required: true
                int: true
                min: 1
                modes:
                  edit:
                    celExpressions:
                      - celExpr: "spec.components.engine.storage.size >= original.spec.components.engine.storage.size"
                        message: "Disk size cannot be decreased"
          componentsOrder:
            - cpu
            - memory
            - disk

    advanced:
      label: "Advanced"
      description: "Optional advanced settings."
      components:
        storageClass:
          uiType: select
          path: spec.components.engine.storage.storageClass
          fieldParams:
            label: "Storage class"
            displayEmpty: true
            modes:
              edit:
                disabled: true
          dataSource:
            provider: storageClasses

  sectionsOrder:
    - kafkaVersion
    - resources
    - advanced
