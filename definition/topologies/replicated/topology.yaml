# Replicated topology: multi-replica ClickHouse with ClickHouse Keeper.
# ClickHouse Keeper (3 nodes, Raft quorum) replaces ZooKeeper — no external dependency.
# Suitable for production workloads requiring high availability.
#
# Resources:
#   engine   - ClickHouse replicas (configurable count, default 2)
#   keeper   - 3 Keeper nodes are always provisioned automatically (not user-configurable)

config:
  components:
    engine: {}

ui:
  sections:
    databaseVersion:
      label: "Database Version"
      description: "Select the ClickHouse version to deploy."
      components:
        version:
          uiType: select
          path: spec.version
          fieldParams:
            label: "ClickHouse Version"
            optionsPath: spec.versions
            optionsPathConfig:
              labelPath: "name"
              valuePath: "name"
            modes:
              edit:
                disabled: true
          validation:
            required: true

    scaling:
      label: "Scaling"
      description: "Number of ClickHouse replicas. Minimum 2 for HA."
      components:
        replicas:
          uiType: number
          path: spec.components.engine.replicas
          fieldParams:
            label: "Replicas"
            defaultValue: 2
            step: 1
            modes:
              edit:
                disabled: true
          validation:
            required: true
            min: 2

    resources:
      label: "Resources"
      description: "Compute resources and storage per ClickHouse replica."
      components:
        compute:
          uiType: group
          groupType: line
          components:
            cpu:
              uiType: number
              path: spec.components.engine.resources.limits.cpu
              fieldParams:
                label: "CPU"
                defaultValue: 2
                step: 1
              validation:
                required: true
                min: 1
            memory:
              uiType: number
              path: spec.components.engine.resources.limits.memory
              fieldParams:
                label: "Memory"
                defaultValue: 8
                step: 1
                badge: "Gi"
                badgeToApi: true
              validation:
                required: true
                min: 2
            disk:
              uiType: number
              path: spec.components.engine.storage.size
              fieldParams:
                label: "Disk"
                defaultValue: 50
                badge: "Gi"
                badgeToApi: true
              validation:
                required: true
                int: true
                min: 10
                modes:
                  edit:
                    celExpressions:
                      - celExpr: "spec.components.engine.storage.size >= original.spec.components.engine.storage.size"
                        message: "Disk size cannot be decreased"
          componentsOrder:
            - cpu
            - memory
            - disk

    advanced:
      label: "Advanced"
      description: "Optional advanced settings."
      components:
        storageClass:
          uiType: select
          path: spec.components.engine.storage.storageClass
          fieldParams:
            label: "Storage class"
            displayEmpty: true
            modes:
              edit:
                disabled: true
          dataSource:
            provider: storageClasses

  sectionsOrder:
    - databaseVersion
    - scaling
    - resources
    - advanced
